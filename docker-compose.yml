services:
  streamer:
    build:
      context: ./streamer

    container_name: video-streamer
    privileged: true
    devices:
      - "/dev/video0:/dev/video0"# optional on Linux; remove on mac/win
      - "/dev/video1:/dev/video1"
      - "/dev/snd:/dev/snd"
    environment:
      - INPUT=${INPUT:-/dev/video}        # device, file, or rtsp URL
      - USE_NVENC=${USE_NVENC:-false}       # true/false
      - HLS_DIR=/var/www/hls
      - RECORD_DIR=/recordings
      - UDP_PORT=10000
      - VIDEO_SCALE=${VIDEO_SCALE:-1280:720}
      - TURN_SERVER_HOST=${TURN_SERVER_HOST:-localhost}
      - TURN_SERVER_PORT=${TURN_SERVER_PORT:-3478}
      - TURN_SERVER_USER=${TURN_SERVER_USER:-turnuser}
      - TURN_SERVER_PASS=${TURN_SERVER_PASS:-turnpass}

    volumes:
      - hls-data:/var/www/hls
      - recordings:/recordings
    ports:
      - "8081:8081"   # WebRTC signaling (aiortc) /offer endpoint
    deploy:
      restart_policy:
        condition: any

    networks:
      - monitoring_network
      - streaming_network


    # Use this when you have NVIDIA container toolkit installed:
    #runtime: nvidia
    #environment:
    #  - NVIDIA_VISIBLE_DEVICES=all

  web:
    build: ./nginx
    container_name: hls-web
    depends_on:
      - streamer
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - hls-data:/var/www/hls

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    environment:
      # increases the log level from info to debug
      - GF_LOG_LEVEL=error
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command: --config.file=/etc/prometheus/prometheus.yml --web.enable-lifecycle
    restart: unless-stopped
    networks:
      - monitoring_network

  grafana:
    image: grafana/grafana
    container_name: grafana
    environment:
      # increases the log level from info to debug
      - GF_LOG_LEVEL=error
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring_network

  node-exporter:
    image: prom/node-exporter:latest
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro'
    environment:
      # increases the log level from info to debug
      - GF_LOG_LEVEL=error
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - monitoring_network

networks:
  # Define both networks
  streaming_network:
    driver: bridge
  monitoring_network:
    driver: bridge

volumes:
  hls-data:
  recordings:
  grafana-data:
  prometheus_data:
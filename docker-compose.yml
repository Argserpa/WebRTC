services:
  streamer:
    build: ./streamer
    container_name: video-streamer
    privileged: true
    devices:
      - "/dev/video0:/dev/video0"
      - "/dev/video1:/dev/video1"
      - "/dev/snd:/dev/snd"
    environment:
      - INPUT=${INPUT:-/dev/video0}
      - USE_NVENC=${USE_NVENC:-false}
      - HLS_DIR=/var/www/hls
      - RECORD_DIR=/recordings
      - UDP_PORT=10000
      - VIDEO_SCALE=${VIDEO_SCALE:-1280:720}
      - SEGMENT_DURATION=${SEGMENT_DURATION:-1800}
    volumes:
      - hls-data:/var/www/hls
      - recordings:/recordings
    expose:
      - "8081"
    deploy:
      restart_policy:
        condition: any
    networks:
      - monitoring_network
      - streaming_network

  web:
    build: ./nginx
    container_name: hls-web
    depends_on:
      - streamer
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - hls-data:/var/www/hls
      - recordings:/var/www/recordings:ro
    restart: unless-stopped
    networks:
      - streaming_network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    environment:
      - GF_LOG_LEVEL=error
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command: --config.file=/etc/prometheus/prometheus.yml --web.enable-lifecycle
    restart: unless-stopped
    networks:
      - monitoring_network

  grafana:
    image: grafana/grafana
    container_name: grafana
    environment:
      - GF_LOG_LEVEL=error
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring_network

  node-exporter:
    image: prom/node-exporter:latest
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro'
    environment:
      - GF_LOG_LEVEL=error
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - monitoring_network

networks:
  streaming_network:
    driver: bridge
  monitoring_network:
    driver: bridge

volumes:
  hls-data:
  recordings:
  grafana-data:
  prometheus_data:
worker_processes 1;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    server {
        listen 8080;
        server_name _;

        # Página web
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # HLS segments (live)
        location /hls/ {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            alias /var/www/hls/;
            autoindex on;
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin *;
        }

        # Grabaciones .ts servidas directamente
        location /recordings/ {
            alias /var/www/recordings/;
            autoindex off;

            types {
                video/mp2t ts;
            }

            add_header Accept-Ranges bytes;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "private, max-age=3600";
        }

        # API de grabaciones + playlist m3u8 dinámica → streamer
        location /api/recordings {
            proxy_pass http://video-streamer:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebRTC signaling → streamer
        location /offer {
            proxy_pass http://video-streamer:8081/offer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Content-Type $content_type;
            proxy_pass_request_body on;
        }

        # Métricas → streamer
        location /metrics {
            proxy_pass http://video-streamer:8081/metrics;
        }
    }
}
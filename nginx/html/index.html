<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WebRTC Live Viewer</title>
    <link rel="icon" href="/images/favicon.png" type="image/x-icon"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0c0e13;
            --surface: #161921;
            --surface-2: #1e222d;
            --border: #2a2f3d;
            --text: #e4e7ee;
            --text-dim: #7c839a;
            --accent: #4e8fff;
            --accent-soft: rgba(78, 143, 255, 0.12);
            --green: #34d399;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        .header h1 .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .header-nav a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .header-nav a:hover { color: var(--text); background: var(--surface-2); }
        .header-nav a.active { color: var(--accent); background: var(--accent-soft); }
        .content {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        video {
            width: 100%;
            max-height: 70vh;
            display: block;
            background: #000;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 14px;
        }
        .controls button {
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .controls button:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
        }
        .latency-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--green);
            background: rgba(52,211,153,0.1);
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid rgba(52,211,153,0.2);
        }
    </style>
</head>
<body>

<div class="header">
    <h1><span class="live-dot"></span> Live Stream</h1>
    <nav class="header-nav">
        <a href="/" class="active">Live Stream</a>
        <a href="/recordings.html">Recordings</a>
    </nav>
</div>

<div class="content">
    <video id="video" autoplay playsinline controls></video>
    <div class="controls">
        <button onclick="startPlayback()">&#9654; Start playback</button>
        <span class="latency-badge" id="latencyDisplay">RTT: --</span>
    </div>
</div>

<script>
    let pc;
    let metricsChannel;
    let latencyInterval;
    const videoEl = document.getElementById('video');
    const latencyDisplay = document.getElementById('latencyDisplay');

    async function startPlayback() {
        try { await videoEl.play(); } catch (e) { console.warn("User gesture required:", e); }
    }

    async function initWebRTC() {
        pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        });

        pc.oniceconnectionstatechange = () => console.log("ICE state:", pc.iceConnectionState);
        pc.onconnectionstatechange = () => console.log("Peer state:", pc.connectionState);

        pc.addTransceiver("video", { direction: "recvonly" });
        pc.addTransceiver("audio", { direction: "recvonly" });

        pc.ontrack = (event) => {
            if (event.receiver) {
                try { event.receiver.playoutDelayHint = 0; } catch(e) {}
                try { event.receiver.jitterBufferTarget = 0; } catch(e) {}
            }
            if (!videoEl.srcObject) videoEl.srcObject = event.streams[0];
        };

        metricsChannel = pc.createDataChannel("metrics", { ordered: false });
        metricsChannel.onopen = () => { latencyInterval = setInterval(sendLatencyPing, 5000); };
        metricsChannel.onclose = () => { if (latencyInterval) clearInterval(latencyInterval); };
        metricsChannel.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === "latency_pong") {
                    const rtt = performance.now() - data.timestamp;
                    latencyDisplay.textContent = "RTT: " + rtt.toFixed(1) + " ms";
                    if (metricsChannel.readyState === "open") {
                        metricsChannel.send(JSON.stringify({ type: "latency_report", latency: rtt }));
                    }
                }
            } catch (e) { console.error("Error parsing pong:", e); }
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        const resp = await fetch("/offer", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(pc.localDescription)
        });
        if (!resp.ok) throw new Error("Failed to fetch WebRTC answer: " + resp.status);

        const answer = await resp.json();
        await pc.setRemoteDescription(answer);
        console.log("WebRTC signaling completed");
    }

    function sendLatencyPing() {
        if (metricsChannel && metricsChannel.readyState === "open") {
            metricsChannel.send(JSON.stringify({ type: "latency_ping", timestamp: performance.now() }));
        }
    }

    initWebRTC().catch(e => { console.error(e); alert("WebRTC init failed: " + e); });
</script>
</body>
</html>

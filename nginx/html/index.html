<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>WebRTC Live Viewer</title>
    <link rel="icon" href="/images/favicon.png" type="image/x-icon"/>
</head>
<body>

<h1 style="text-align:center">WebRTC Live Viewer (Low Latency)</h1>

<video id="video"
       autoplay
       playsinline
       controls
       style="width:80%;height:auto;margin:0 auto;display:block;background:black">
</video>

<div style="text-align:center;margin-top:10px;">
    <button onclick="startPlayback()">&#9654; Start playback</button>
    <span id="latencyDisplay" style="margin-left:20px;font-family:monospace;font-size:14px;color:#666;"></span>
</div>

<script>
    let pc;
    let metricsChannel;
    let latencyInterval;
    const videoEl = document.getElementById('video');
    const latencyDisplay = document.getElementById('latencyDisplay');

    async function startPlayback() {
        try {
            await videoEl.play();
            console.log("Playback started");
        } catch (e) {
            console.warn("User gesture required:", e);
        }
    }

    async function initWebRTC() {
        pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        });

        pc.oniceconnectionstatechange = () =>
            console.log("ICE state:", pc.iceConnectionState);

        pc.onconnectionstatechange = () =>
            console.log("Peer state:", pc.connectionState);

        /* ---- recvonly transceivers ---- */
        pc.addTransceiver("video", { direction: "recvonly" });
        pc.addTransceiver("audio", { direction: "recvonly" });

        pc.ontrack = (event) => {
            console.log("Track received:", event.track.kind);

            if (event.receiver) {
                try { event.receiver.playoutDelayHint = 0; } catch(e) {}
                try { event.receiver.jitterBufferTarget = 0; } catch(e) {}
            }

            if (!videoEl.srcObject) {
                videoEl.srcObject = event.streams[0];
            }
        };

        /* ---- DataChannel para medir latencia ---- */
        metricsChannel = pc.createDataChannel("metrics", { ordered: false });

        metricsChannel.onopen = () => {
            console.log("Metrics DataChannel open");
            latencyInterval = setInterval(sendLatencyPing, 5000);
        };

        metricsChannel.onclose = () => {
            console.log("Metrics DataChannel closed");
            if (latencyInterval) clearInterval(latencyInterval);
        };

        metricsChannel.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === "latency_pong") {
                    const rtt = performance.now() - data.timestamp;
                    console.log("RTT:", rtt.toFixed(1), "ms");

                    latencyDisplay.textContent = "RTT: " + rtt.toFixed(1) + " ms";

                    // Reportar al servidor para Prometheus
                    if (metricsChannel.readyState === "open") {
                        metricsChannel.send(JSON.stringify({
                            type: "latency_report",
                            latency: rtt
                        }));
                    }
                }
            } catch (e) {
                console.error("Error parsing pong:", e);
            }
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        const resp = await fetch(`http://${location.hostname}:8081/offer`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(pc.localDescription)
        });

        if (!resp.ok) {
            throw new Error("Failed to fetch WebRTC answer");
        }

        const answer = await resp.json();
        await pc.setRemoteDescription(answer);

        console.log("WebRTC signaling completed");
    }

    function sendLatencyPing() {
        if (metricsChannel && metricsChannel.readyState === "open") {
            metricsChannel.send(JSON.stringify({
                type: "latency_ping",
                timestamp: performance.now()
            }));
        }
    }

    initWebRTC().catch(e => {
        console.error(e);
        alert("WebRTC init failed: " + e);
    });
</script>

</body>
</html>

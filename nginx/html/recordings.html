<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Recordings</title>
    <link rel="icon" href="/images/favicon.png" type="image/x-icon"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0c0e13;
            --surface: #161921;
            --surface-2: #1e222d;
            --border: #2a2f3d;
            --text: #e4e7ee;
            --text-dim: #7c839a;
            --accent: #4e8fff;
            --accent-soft: rgba(78, 143, 255, 0.12);
            --danger: #ff5c5c;
            --green: #34d399;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 32px; border-bottom: 1px solid var(--border); background: var(--surface);
        }
        .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
        .header h1 span { color: var(--accent); }
        .header-nav a {
            color: var(--text-dim); text-decoration: none; font-size: 14px; font-weight: 500;
            padding: 8px 16px; border-radius: 8px; transition: all 0.2s;
        }
        .header-nav a:hover { color: var(--text); background: var(--surface-2); }
        .header-nav a.active { color: var(--accent); background: var(--accent-soft); }

        .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 61px); }

        .sidebar {
            border-right: 1px solid var(--border); background: var(--surface);
            padding: 20px 0; overflow-y: auto;
        }
        .sidebar-title {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--text-dim); padding: 0 20px 12px;
        }
        .date-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px; cursor: pointer; transition: all 0.15s;
            border-left: 3px solid transparent;
        }
        .date-item:hover { background: var(--surface-2); }
        .date-item.active { background: var(--accent-soft); border-left-color: var(--accent); }
        .date-item .date-label { font-size: 14px; font-weight: 500; font-family: 'JetBrains Mono', monospace; }
        .date-item .date-count {
            font-size: 12px; color: var(--text-dim); background: var(--surface-2);
            padding: 2px 8px; border-radius: 10px;
        }
        .date-item.active .date-count { background: var(--accent); color: white; }
        .sidebar-empty { padding: 40px 20px; text-align: center; color: var(--text-dim); font-size: 14px; }

        .main { padding: 28px 32px; overflow-y: auto; }
        .main-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.02em; }
        .main-subtitle { font-size: 14px; color: var(--text-dim); margin-bottom: 24px; }

        .player-container {
            display: none; margin-bottom: 28px; background: #000;
            border-radius: 12px; overflow: hidden; border: 1px solid var(--border);
        }
        .player-container.visible { display: block; }
        .player-container video { width: 100%; max-height: 60vh; display: block; }
        .player-info {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border);
        }
        .player-info .now-playing { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--green); }
        .player-btn {
            font-size: 13px; color: var(--text-dim); background: var(--surface-2);
            border: 1px solid var(--border); padding: 4px 12px; border-radius: 6px;
            cursor: pointer; transition: all 0.15s; text-decoration: none;
        }
        .player-btn:hover { color: var(--accent); border-color: var(--accent); }
        .player-btn.close:hover { color: var(--danger); border-color: var(--danger); }
        .player-buttons { display: flex; gap: 8px; }

        .recordings-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px;
        }
        .recording-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
            padding: 16px; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 14px;
        }
        .recording-card:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }
        .recording-card.playing { border-color: var(--green); background: rgba(52, 211, 153, 0.08); }
        .card-icon {
            width: 44px; height: 44px; border-radius: 10px; background: var(--surface-2);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px;
        }
        .recording-card.playing .card-icon { background: rgba(52, 211, 153, 0.15); }
        .card-details { flex: 1; min-width: 0; }
        .card-time { font-size: 16px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
        .card-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-dim); }
        .empty-state .emoji { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state p { font-size: 15px; max-width: 320px; margin: 0 auto; line-height: 1.6; }

        .loading-spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: 200px; }
            .main { padding: 20px 16px; }
            .header { padding: 12px 16px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1><span>&#9679;</span> Recordings</h1>
    <nav class="header-nav">
        <a href="/">Live Stream</a>
        <a href="/recordings.html" class="active">Recordings</a>
    </nav>
</div>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-title">Dates</div>
        <div id="dateList">
            <div class="sidebar-empty">
                <div class="loading-spinner"></div>
                <p style="margin-top:12px">Loading...</p>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="player-container" id="playerContainer">
            <video id="videoPlayer" controls></video>
            <div class="player-info">
                <span class="now-playing" id="nowPlaying">-</span>
                <div class="player-buttons">
                    <a class="player-btn" id="downloadBtn" href="#" download>Download</a>
                    <button class="player-btn close" onclick="closePlayer()">Close</button>
                </div>
            </div>
        </div>

        <h2 class="main-title" id="mainTitle">Select a date</h2>
        <p class="main-subtitle" id="mainSubtitle">Choose a date from the sidebar to view recordings</p>

        <div id="content">
            <div class="empty-state">
                <div class="emoji">&#128249;</div>
                <p>Select a date from the sidebar to browse recorded sessions.</p>
            </div>
        </div>
    </div>
</div>

<!-- hls.js for playing .ts files via dynamic m3u8 -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
    let currentDate = null;
    let currentHls = null;

    async function loadDates() {
        try {
            const resp = await fetch('/api/recordings');
            const data = await resp.json();
            renderDates(data.dates);
        } catch (e) {
            console.error('Error loading dates:', e);
            document.getElementById('dateList').innerHTML = '<div class="sidebar-empty">Error loading dates</div>';
        }
    }

    function renderDates(dates) {
        const container = document.getElementById('dateList');
        if (!dates || dates.length === 0) {
            container.innerHTML = '<div class="sidebar-empty">No recordings yet</div>';
            return;
        }
        container.innerHTML = dates.map(d => `
            <div class="date-item" data-date="${d.date}" onclick="selectDate('${d.date}')">
                <span class="date-label">${d.date}</span>
                <span class="date-count">${d.count}</span>
            </div>
        `).join('');
        selectDate(dates[0].date);
    }

    async function selectDate(dateStr) {
        currentDate = dateStr;
        document.querySelectorAll('.date-item').forEach(el => {
            el.classList.toggle('active', el.dataset.date === dateStr);
        });
        document.getElementById('mainTitle').textContent = formatDate(dateStr);
        document.getElementById('mainSubtitle').textContent = 'Loading recordings...';
        document.getElementById('content').innerHTML =
            '<div style="text-align:center;padding:40px"><div class="loading-spinner"></div></div>';
        try {
            const resp = await fetch(`/api/recordings/${dateStr}`);
            const data = await resp.json();
            renderRecordings(data.files);
        } catch (e) {
            console.error('Error loading recordings:', e);
            document.getElementById('content').innerHTML =
                '<div class="empty-state"><p>Error loading recordings</p></div>';
        }
    }

    function renderRecordings(files) {
        const subtitle = document.getElementById('mainSubtitle');
        if (!files || files.length === 0) {
            subtitle.textContent = 'No recordings found for this date';
            document.getElementById('content').innerHTML =
                '<div class="empty-state"><div class="emoji">&#128193;</div><p>No recordings for this date</p></div>';
            return;
        }
        subtitle.textContent = `${files.length} recording${files.length !== 1 ? 's' : ''}`;

        const grid = document.createElement('div');
        grid.className = 'recordings-grid';
        files.forEach(file => {
            const card = document.createElement('div');
            card.className = 'recording-card';
            card.onclick = () => playRecording(file, card);
            card.innerHTML = `
                <div class="card-icon">&#9654;</div>
                <div class="card-details">
                    <div class="card-time">${file.display_time}</div>
                    <div class="card-meta">${file.size_mb} MB</div>
                </div>
            `;
            grid.appendChild(card);
        });
        document.getElementById('content').innerHTML = '';
        document.getElementById('content').appendChild(grid);
    }

    function playRecording(file, cardEl) {
        const video = document.getElementById('videoPlayer');
        const container = document.getElementById('playerContainer');

        // Clean up previous hls instance
        if (currentHls) {
            currentHls.destroy();
            currentHls = null;
        }

        document.querySelectorAll('.recording-card.playing').forEach(el => el.classList.remove('playing'));
        cardEl.classList.add('playing');

        // Play via hls.js using the dynamic m3u8 playlist
        if (Hls.isSupported()) {
            currentHls = new Hls();
            currentHls.loadSource(file.url);  // /api/recordings/{date}/{file}/playlist.m3u8
            currentHls.attachMedia(video);
            currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(() => {});
            });
            currentHls.on(Hls.Events.ERROR, (event, data) => {
                console.error('HLS error:', data);
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari native HLS
            video.src = file.url;
            video.play().catch(() => {});
        }

        // Set download link
        document.getElementById('downloadBtn').href = file.download_url;

        document.getElementById('nowPlaying').textContent = `${currentDate}  ${file.display_time}`;
        container.classList.add('visible');
        container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function closePlayer() {
        const video = document.getElementById('videoPlayer');
        if (currentHls) {
            currentHls.destroy();
            currentHls = null;
        }
        video.pause();
        video.removeAttribute('src');
        document.getElementById('playerContainer').classList.remove('visible');
        document.querySelectorAll('.recording-card.playing').forEach(el => el.classList.remove('playing'));
    }

    function formatDate(dateStr) {
        try {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        } catch { return dateStr; }
    }

    loadDates();
</script>
</body>
</html>
